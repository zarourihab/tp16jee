spring.application.name=tp8-monitoring
server.port=8082

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

info.app.name=Spring Monitoring App
info.app.version=1.0.0
info.app.description=TP8 Monitoring Spring Boot

logging.level.root=INFO
logging.level.ma.ens.monitoringapp=DEBUG
logging.file.name=logs/application.log
logging.pattern.console=%d{HH:mm:ss} [%t] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n